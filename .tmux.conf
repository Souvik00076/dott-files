
# ... all your existing config above ...

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-net-speed'
set -g @plugin 'tmux-plugins/tmux-sidebar'



# --- Orange Theme ---
set -g status-position bottom
set -g status-style 'bg=#1a1b26 fg=#ff9e64'

# Left: session name with orange accent
set -g status-left '#[bg=#ff9e64,fg=#1a1b26,bold] #S #[bg=#1a1b26] '
set -g status-left-length 30

# Right: time/date
set -g status-right '#[fg=#ff9e64] %H:%M #[bg=#ff9e64,fg=#1a1b26,bold] %d-%b-%y '
set -g status-right-length 50

# Window tabs
set -g window-status-format '#[fg=#565f89] #I:#W '
set -g window-status-current-format '#[fg=#1a1b26,bg=#ff9e64,bold] #I:#W '

# Pane borders
set -g pane-border-style 'fg=#565f89'
set -g pane-active-border-style 'fg=#ff9e64'

# Messages & command prompt
set -g message-style 'bg=#ff9e64 fg=#1a1b26,bold'
set -g mode-style 'bg=#ff9e64 fg=#1a1b26'

set -g window-style 'fg=#565f89,bg=#16161e'
set -g window-active-style 'fg=#c0caf5,bg=#1a1b26'
set -g status-right '#[fg=#ff5555] CPU:#{cpu_percentage} #[fg=#50fa7b] RAM:#{ram_percentage} #[fg=#87ceeb] #{net_speed} #[fg=#50fa7b] #{battery_icon}#{battery_percentage} #[fg=#ff9e64] %H:%M #[bg=#ff9e64,fg=#1a1b26,bold] %d-%b-%y '

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set-option -g default-shell /bin/bash
set-option -g default-command /bin/bash
set -g mouse on
set-window-option -g mode-keys vi
unbind C-b
set -g prefix M-a
bind M-a send-prefix

#select pane left
bind -n M-h select-pane -L
#select pane right
bind -n M-l select-pane -R
#select pane up
bind -n M-k select-pane -U
#select pane down
bind -n M-j select-pane -D

# Additional useful Alt bindings for common operations
bind -n M-f split-window -h -c "#{pane_current_path}" # Split horizontally
bind -n M-d split-window -v -c "#{pane_current_path}" # Split vertically
bind -n M-s resize-pane -Z  "#{pane_current_path}"  # Toggle zoom

# Change window selection menu to Alt+n (no prefix needed)
bind -n M-t choose-tree -w
# Use Alt+r to rename window (no prefix needed)
bind -n M-R command-prompt -I "#W" "rename-window '%%'"
bind -n M-n new-window           # Alt+Space to create new window
bind -n M-g if -F "#{>:#{window_panes},1}" "kill-pane" "kill-window"
bind -n M-c if -F '#{pane_in_mode}' 'send-keys -X cancel' 'copy-mode'   # Alt+c to toggle copy mode
bind -n M-w if -F "#{==:#{window_index},#{last_window_index}}" "select-window -t 0" "select-window -n"    # Cycle through windows
bind -n M-i resize-pane -Z          # Toggle zoom (hide/show) unfocused panesbind -n M-i if -F '#{window_zoomed_flag}' 'resize-pane -Z' 'select-pane -t :.+>
set -g @sidebar-tree 'M-Space'
run '~/.tmux/plugins/tpm/tpm'

